name: Deploy Storybook

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build-storybook

      # Upload the built storybook to Guing, which deploys it to a public
      # bucket path (live instantly — no GitHub Pages queue). Guing resolves the
      # tenant from the repo and writes the preview URL back onto the dashboard.
      - name: Upload preview to Guing
        env:
          GUING_URL: ${{ secrets.GUING_WEBHOOK_URL }}
          GUING_SECRET: ${{ secrets.GUING_WEBHOOK_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$GUING_URL" ]; then
            echo "GUING_WEBHOOK_URL not set; skipping preview upload."
            exit 0
          fi
          tar -czf storybook.tgz -C storybook-static .
          SIG="sha256=$(openssl dgst -sha256 -hmac "$GUING_SECRET" < storybook.tgz | awk '{print $2}')"
          curl -fsS -X POST "$GUING_URL/api/v1/storybook" \
            -H "content-type: application/gzip" \
            -H "x-guing-repo: ${{ github.repository }}" \
            -H "x-guing-pr: $PR_NUMBER" \
            -H "x-guing-signature: $SIG" \
            --data-binary @storybook.tgz
