name: Deploy Storybook

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build-storybook

      # Upload the built storybook to Guing, which deploys it to a public bucket
      # path (live instantly — no GitHub Pages queue). Auth is GitHub Actions
      # OIDC: no secret to configure. Guing resolves the tenant from the signed
      # `repository` claim and writes the preview URL onto the dashboard + PR.
      - name: Upload preview to Guing
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          tar -czf storybook.tgz -C storybook-static .
          OIDC=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=guing-storybook-preview" | jq -r '.value')
          curl -fsS -X POST "https://us-central1-guing-ai.cloudfunctions.net/api/api/v1/storybook" \
            -H "content-type: application/gzip" \
            -H "authorization: Bearer $OIDC" \
            -H "x-guing-pr: $PR_NUMBER" \
            --data-binary @storybook.tgz
